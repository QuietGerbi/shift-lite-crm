services:
  # Контейнер БД
  postgres-db:
    image: postgres:15
    container_name: crm-postgres-db
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Контейнер для запуска приложения
  crm-app:
    build: .
    container_name: crm-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/crm_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      postgres-db:
        condition: service_healthy

  # Контейнер для тестов
  crm-tests:
    image: gradle:8.14-jdk21
    container_name: crm-test-runner
    volumes:
      - .:/app
    working_dir: /app
    command: gradle test
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - postgres-db

volumes:
  pgdata: